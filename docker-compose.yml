services:
  # ─── Pipecat Voice Bot ──────────────────────────────────────
  # Runs on your server, no GPU needed. Handles WebRTC + pipeline.
  # Route your existing reverse proxy (Coolify/Dokploy/Caddy) to port 7860.
  bot:
    build: .
    container_name: aris-voice-bot
    restart: unless-stopped
    ports:
      - "7860:7860"
    env_file: .env
    environment:
      - BOT_PORT=7860
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health/modal"]
      interval: 30s
      timeout: 10s
      retries: 3
