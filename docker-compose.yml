services:
  # ─── Pipecat Voice Bot ──────────────────────────────────────
  # Runs on Synology, no GPU needed. Handles WebRTC + pipeline.
  bot:
    build: .
    container_name: aris-voice-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:7860:7860"
    env_file: .env
    environment:
      - BOT_PORT=7860
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Caddy Reverse Proxy ────────────────────────────────────
  # Handles HTTPS automatically (Let's Encrypt).
  # Replace aris.yourdomain.com with your actual domain.
  caddy:
    image: caddy:alpine
    container_name: aris-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot

volumes:
  caddy_data:
  caddy_config:
